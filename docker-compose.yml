services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chainpay
      POSTGRES_PASSWORD: chainpay
      POSTGRES_DB: waitlist
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainpay -d waitlist"]
      interval: 5s
      timeout: 3s
      retries: 10

  waitlist:
    build: ./waitlist
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://chainpay:chainpay@db:5432/waitlist"
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    labels:
      harness.smoke: "http://localhost:8080/health"

  landing:
    build: ./landing
    restart: unless-stopped
    depends_on:
      - waitlist
    ports:
      - "3000:80"
    healthcheck:
      # Use 127.0.0.1, not localhost: nginx binds IPv4-only (0.0.0.0:80), but
      # `localhost` resolves to ::1 (IPv6) first inside the container → wget gets
      # connection refused → perpetual unhealthy. See runbook troubleshooting.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 5s
      timeout: 3s
      retries: 10
    labels:
      harness.smoke: "http://localhost:3000/"

volumes:
  pgdata: {}
