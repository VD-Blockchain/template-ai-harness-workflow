server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hide the nginx version in the Server header / error pages.
  server_tokens off;

  # Reverse-proxy the waitlist API over the compose network.
  # No trailing slash on proxy_pass → the /api prefix is preserved, matching the
  # Express routes (/api/waitlist, /api/waitlist/count). The waitlist service sets
  # its own security headers on these JSON responses.
  location /api/ {
    proxy_pass http://waitlist:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA: serve static assets, fall back to index.html for client routes.
  # Security headers for the served page. The CSP allows only same-origin assets
  # plus inline styles (needed for some build output) and data: images; it forbids
  # framing and restricts connections to same-origin (the /api proxy).
  location / {
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;
    try_files $uri /index.html;
  }
}
